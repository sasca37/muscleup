spring:
  application:
    name: health-tracker-api
  datasource:
    url: ${DB_URL:jdbc:h2:mem:health;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  dev-auth-enabled: ${DEV_AUTH_ENABLED:true}

server:
  port: 8080
